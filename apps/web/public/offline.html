<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BlindPass — Offline</title>
    <style>
      :root {
        --bg: #09090b;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --card: #18181b;
        --border: #27272a;
        --primary: #5b21b6;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #fafafa;
          --fg: #09090b;
          --muted: #71717a;
          --card: #ffffff;
          --border: #e4e4e7;
          --primary: #5b21b6;
        }
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        max-width: 22rem;
        width: 100%;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }
      .logo {
        width: 3rem;
        height: 3rem;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        font-size: 0.8125rem;
        color: var(--muted);
        line-height: 1.5;
      }
      button {
        margin-top: 0.25rem;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg);
        font-size: 0.8125rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      button:hover {
        background: var(--border);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
        <rect width="32" height="32" rx="8" fill="#5b21b6" />
        <circle cx="16" cy="13" r="4.5" fill="white" opacity="0.95" />
        <path d="M13 16L11.5 22.5H20.5L19 16" fill="white" opacity="0.95" />
      </svg>
      <h1>You're offline</h1>
      <p>
        BlindPass requires a connection to access your vault. Connect to the internet and try again.
      </p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
