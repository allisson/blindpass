services:
  webapp:
    image: allisson/blindpass-webapp
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '8000:8000'
    networks:
      - frontend
    environment:
      SERVER_BASE_URL: http://server:3000
    deploy:
      resources:
        limits:
          memory: 64M

  server:
    image: allisson/blindpass-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      TOTP_SECRET_ENCRYPTION_KEY: ${TOTP_SECRET_ENCRYPTION_KEY}
      REDIS_URL: ${REDIS_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  migrate:
    image: allisson/blindpass-server
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      TOTP_SECRET_ENCRYPTION_KEY: ${TOTP_SECRET_ENCRYPTION_KEY}
      REDIS_URL: ${REDIS_URL}
    command: ['node', 'dist/index.js', 'migrate']
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_DB: blindpass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:

networks:
  frontend:
  backend:
